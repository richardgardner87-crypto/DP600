<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Three pillars of enterprise AI</title>
  <desc>A triangle diagram showing three interdependent components: Behaviour (prompts/skills), Knowledge (RAG), and Action (MCP), with bidirectional arrows between them and a central label showing they work together to deliver governed AI.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .label-main { font-size: 14px; font-weight: 600; }
      .label-sub { font-size: 12px; }
      .label-center { font-size: 12px; fill: #888780; }
      .label-edge { font-size: 11px; fill: #888780; }
      .node-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .node-purple text { fill: #3C3489; }
      .node-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .node-teal text { fill: #085041; }
      .node-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .node-coral text { fill: #712B13; }
    </style>
  </defs>

  <!-- Central dashed circle -->
  <circle cx="340" cy="232" r="52" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
  <text class="label-center" x="340" y="226" text-anchor="middle" dominant-baseline="central">governed</text>
  <text class="label-center" x="340" y="242" text-anchor="middle" dominant-baseline="central">enterprise AI</text>

  <!-- Connecting lines -->
  <line x1="292" y1="150" x2="202" y2="302" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="388" y1="150" x2="478" y2="302" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="250" y1="332" x2="430" y2="332" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- Edge labels -->
  <text class="label-edge" x="222" y="212" text-anchor="middle" transform="rotate(-58,222,212)">what it knows</text>
  <text class="label-edge" x="458" y="212" text-anchor="middle" transform="rotate(58,458,212)">what it can do</text>
  <text class="label-edge" x="340" y="324" text-anchor="middle">facts inform actions</text>

  <!-- TOP: Behaviour -->
  <g class="node-purple">
    <rect x="240" y="62" width="200" height="72" rx="10" stroke-width="0.5"/>
    <text class="label-main" x="340" y="90" text-anchor="middle" dominant-baseline="central">Behaviour</text>
    <text class="label-sub" x="340" y="114" text-anchor="middle" dominant-baseline="central">Prompts and skills</text>
  </g>

  <!-- BOTTOM LEFT: Knowledge -->
  <g class="node-teal">
    <rect x="60" y="302" width="200" height="72" rx="10" stroke-width="0.5"/>
    <text class="label-main" x="160" y="330" text-anchor="middle" dominant-baseline="central">Knowledge</text>
    <text class="label-sub" x="160" y="354" text-anchor="middle" dominant-baseline="central">Retrieval augmented generation</text>
  </g>

  <!-- BOTTOM RIGHT: Action -->
  <g class="node-coral">
    <rect x="420" y="302" width="200" height="72" rx="10" stroke-width="0.5"/>
    <text class="label-main" x="520" y="330" text-anchor="middle" dominant-baseline="central">Action</text>
    <text class="label-sub" x="520" y="354" text-anchor="middle" dominant-baseline="central">Model context protocol</text>
  </g>
</svg>
